# cloudformation solution goes here

# CloudFormation template

AWSTemplateFormatVersion: '2010-09-09'
Description: DS5220 Data Project 1 Anomaly Detection Pipeline

Parameters:
  BucketName:
    Type: String
    Description: S3 bucket for anomaly detection pipeline (must be globally unique)
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the EC2 instance and security group will be created
  UbuntuAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id
    Description: Ubuntu 24.04 LTS AMI resolved dynamically via SSM Parameter Store
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access

Resources:

  # S3 Bucket for raw data, baseline, and results
  AnomalyDetectionBucket:
    Type: AWS::S3::Bucket
    DependsOn: AnomalyDetectionTopicPolicy
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      # Notify SNS whenever a CSV is uploaded to the raw/ prefix
      NotificationConfiguration:
        TopicConfigurations:
          - Event: s3:ObjectCreated:*
            # Only trigger on CSV files in the raw/ folder to avoid infinite loops
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: raw/
                  - Name: suffix
                    Value: .csv
            Topic: !Ref AnomalyDetectionTopic

  # IAM Role & Instance Profile
  AnomalyDetectionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3BucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Bucket-level permissions
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${BucketName}
              # Object-level permissions
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub arn:aws:s3:::${BucketName}/*

  AnomalyDetectionInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AnomalyDetectionRole

  # Security Group
  AnomalyDetectionSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH from my IP and API from anywhere
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        # SSH access restricted to my IP only
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 199.111.224.14/32
        # FastAPI port open to all so SNS can reach /notify
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0

  # Elastic IP
  AnomalyDetectionEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  # EC2 Instance 
  AnomalyDetectionInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref UbuntuAmiId
      InstanceType: t3.micro
      IamInstanceProfile: !Ref AnomalyDetectionInstanceProfile
      KeyName: !Ref KeyPairName
      SecurityGroupIds:
        - !Ref AnomalyDetectionSG
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 16
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          # Update and install dependencies
          apt-get update -y
          apt-get install -y git python3 python3-pip python3-venv

          # Clone the forked repository
          git clone https://github.com/stefanregalia/anomaly-detection.git /opt/anomaly-detection

          # Create a virtual environment
          python3 -m venv /opt/anomaly-detection/venv

          # Install Python dependencies from requirements.txt
          /opt/anomaly-detection/venv/bin/pip install -r /opt/anomaly-detection/requirements.txt

          # Set BUCKET_NAME for the current bootstrap session
          export BUCKET_NAME=${BucketName}

          # Set BUCKET_NAME as a global environment variable for future reboots and logins
          echo "BUCKET_NAME=${BucketName}" >> /etc/environment

          # Start FastAPI bound to all interfaces on port 8000 so SNS can reach /notify
          # Run as a background process so UserData does not block or kill the service on exit
          nohup /opt/anomaly-detection/venv/bin/fastapi run /opt/anomaly-detection/app.py --host 0.0.0.0 --port 8000 &

  AnomalyDetectionEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref AnomalyDetectionInstance
      AllocationId: !GetAtt AnomalyDetectionEIP.AllocationId

  # SNS Topic
  AnomalyDetectionTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ds5220-dp1

  # SNS Topic Policy
  AnomalyDetectionTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref AnomalyDetectionTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref AnomalyDetectionTopic
            Condition:
              ArnLike:
                aws:SourceArn: !Sub arn:aws:s3:::${BucketName}

  # SNS Subscription
  AnomalyDetectionSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AnomalyDetectionTopic
      Protocol: http
      Endpoint: !Sub http://${AnomalyDetectionEIP}:8000/notify